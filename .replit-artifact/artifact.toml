kind = "web"
previewPath = "/"
title = "FHP — Fazúľové Herné Poklady"
version = "1.0.0"
id = "artifacts/fhp-storefront"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21178

[services.development]
run = "pnpm --filter @workspace/fhp-storefront run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fhp-storefront", "run", "build" ]
publicDir = "artifacts/fhp-storefront/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21178"
BASE_PATH = "/"
